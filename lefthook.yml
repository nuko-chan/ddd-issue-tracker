pre-push:
  parallel: true
  jobs:
    - name: tsc
      run: pnpm run tsc
    - name: test
      run: pnpm test

pre-commit:
  parallel: true
  jobs:
    - run: pnpm check
      glob: "*.{js,ts,jsx,tsx,md}"
